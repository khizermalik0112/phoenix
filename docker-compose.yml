version: '3.8'
services:
  api:
    build: .
    image: phoenix-app
    ports:
      - "8050:5000"
    environment:
      - DATABASE_URI=mongodb://database:27017/phoenix
    depends_on:
      - database
  database:
    image: mongo:latest
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: